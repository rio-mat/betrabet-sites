  </defs>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)" filter="url(#shadow)"/>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#shine)"/>
  <text x="256" y="340" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="320" fill="#000000" opacity="0.15">B</text>
  <text x="256" y="336" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="320" fill="#ffffff">B</text>
